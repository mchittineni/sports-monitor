name: Deploy Backend

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod
  push:
    branches:
      - main
    paths:
      - 'backend/**'

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_ENV: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  build-and-deploy-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          load: true
          tags: sports-monitor-backend:${{ github.sha }}

      - name: Scan backend image for vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "sports-monitor-backend:${{ github.sha }}"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Push backend image
        run: |
          docker tag sports-monitor-backend:${{ github.sha }} ${{ steps.login-ecr.outputs.registry }}/sports-monitor-backend:latest
          docker tag sports-monitor-backend:${{ github.sha }} ${{ steps.login-ecr.outputs.registry }}/sports-monitor-backend:${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/sports-monitor-backend:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/sports-monitor-backend:${{ github.sha }}

      - name: Deploy Lambda from ECR
        run: |
          aws lambda update-function-code \
            --function-name sports-monitor-api-${TF_ENV} \
            --image-uri ${{ steps.login-ecr.outputs.registry }}/sports-monitor-backend:${{ github.sha }}

      - name: Wait for deployment
        run: |
          aws lambda wait function-updated \
            --function-name sports-monitor-api-${TF_ENV}

      - name: Get API URL
        id: api-url
        run: |
          API_ID=$(aws apigatewayv2 get-apis --query 'Items[?Name==`sports-monitor-api-${{ env.TF_ENV }}`].ApiId' --output text)
          echo "url=https://$API_ID.execute-api.${{ secrets.AWS_REGION }}.amazonaws.com" >> $GITHUB_OUTPUT

      - name: Run smoke tests
        run: |
          HEALTH_CHECK=$(curl -s ${{ steps.api-url.outputs.url }}/health)
          if [ "$(echo $HEALTH_CHECK | jq -r .status)" != "ok" ]; then
            echo "Health check failed!"
            exit 1
          fi
