name: Build & Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - "docker-compose.yml"
      - ".github/workflows/build.yml"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          load: true
          tags: sports-monitor-frontend:${{ github.sha }}

      - name: Scan frontend image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "sports-monitor-frontend:${{ github.sha }}"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Push frontend image
        run: |
          docker tag sports-monitor-frontend:${{ github.sha }} ${{ steps.login-ecr.outputs.registry }}/sports-monitor-frontend:latest
          docker tag sports-monitor-frontend:${{ github.sha }} ${{ steps.login-ecr.outputs.registry }}/sports-monitor-frontend:${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/sports-monitor-frontend:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/sports-monitor-frontend:${{ github.sha }}

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          load: true
          tags: sports-monitor-backend:${{ github.sha }}

      - name: Scan backend image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "sports-monitor-backend:${{ github.sha }}"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Push backend image
        run: |
          docker tag sports-monitor-backend:${{ github.sha }} ${{ steps.login-ecr.outputs.registry }}/sports-monitor-backend:latest
          docker tag sports-monitor-backend:${{ github.sha }} ${{ steps.login-ecr.outputs.registry }}/sports-monitor-backend:${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/sports-monitor-backend:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/sports-monitor-backend:${{ github.sha }}

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
