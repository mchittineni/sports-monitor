name: Deploy Infrastructure & Application

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "backend/**"
      - ".github/workflows/deploy.yml"

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_ENV: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Terraform Init
        run: |
          cd terraform
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${TF_ENV}/terraform.tfstate" \
            -backend-config="region=us-east-1"

      - name: Terraform Plan
        id: plan
        run: |
          cd terraform
          terraform plan \
            -var-file="environments/${TF_ENV}.tfvars" \
            -var="db_username=${{ secrets.DB_USERNAME }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="alarm_email=${{ secrets.ALARM_EMAIL }}" \
            -out=tfplan

      - name: Comment PR with plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/tfplan', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${plan}\n\`\`\``
            })

  terraform-apply:
    runs-on: ubuntu-latest
    needs: [terraform-plan]
    permissions:
      contents: read
      id-token: write
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Terraform Init
        run: |
          cd terraform
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${TF_ENV}/terraform.tfstate" \
            -backend-config="region=us-east-1"

      - name: Terraform Apply
        run: |
          cd terraform
          terraform apply \
            -var-file="environments/${TF_ENV}.tfvars" \
            -var="db_username=${{ secrets.DB_USERNAME }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="alarm_email=${{ secrets.ALARM_EMAIL }}" \
            -auto-approve

      - name: Get outputs
        id: tf-outputs
        run: |
          cd terraform
          echo "API_URL=$(terraform output -raw api_gateway_url)" >> $GITHUB_OUTPUT
          echo "CLOUDFRONT_URL=$(terraform output -raw cloudfront_domain)" >> $GITHUB_OUTPUT

      - name: Upload Terraform outputs
        uses: actions/upload-artifact@v7
        with:
          name: terraform-outputs
          path: terraform/terraform.tfstate

  deploy-backend:
    runs-on: ubuntu-latest
    needs: [terraform-apply]
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy Lambda from ECR
        run: |
          aws lambda update-function-code \
            --function-name sports-monitor-api-${TF_ENV} \
            --image-uri ${{ secrets.ECR_REGISTRY }}/sports-monitor-backend:${{ github.sha }}

      - name: Wait for deployment
        run: |
          aws lambda wait function-updated \
            --function-name sports-monitor-api-${TF_ENV}

      - name: Run smoke tests
        run: |
          HEALTH_CHECK=$(curl -s https://$(cd terraform && terraform output -raw api_gateway_url)/health)
          if [ "$(echo $HEALTH_CHECK | jq -r .status)" != "ok" ]; then
            echo "Health check failed!"
            exit 1
          fi

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [terraform-apply]
    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: package-lock.json
          # cache-dependency-path: ./frontend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Build frontend
        working-directory: ./frontend
        run: npm ci && npm run build

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/dist s3://sports-monitor-frontend-${TF_ENV} --delete

      - name: Invalidate CloudFront
        run: |
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name sports-monitor-${TF_ENV} \
            --query 'Stacks[0].Outputs[?OutputKey==`CloudFrontDistributionId`].OutputValue' \
            --output text)
          aws cloudfront create-invalidation \
            --distribution-id $DISTRIBUTION_ID \
            --paths '/*'
