name: Test & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Format check
        run: npm run format

      - name: Unit Test
        run: npm run test:coverage -- --run

      - name: Build
        run: npm run build

  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Format check
        run: npm run format

      - name: Unit Test
        run: npm run test:coverage -- --run

      - name: Build
        run: npm run build

  terraform-security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
      
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        
      - name: Run Trivy vulnerability scanner (IaC)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: './terraform'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'

      # - name: Setup TFLint
      #   uses: terraform-linters/setup-tflint@v6        
      #   with:
      #     tflint_version: latest
      #     tflint_config_path: terraform/.tflint.hcl
      #     cache: true

      # - name: Run TFLint
      #   working-directory: ./terraform
      #   env:
      #     GITHUB_TOKEN: ${{ github.token }}
      #   run: |
      #     tflint --init
      #     tflint -f sarif > tflint.sarif

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ./terraform
          config_file: ./terraform/.checkov.yml
          output_format: sarif
          output_file_path: ./checkov.sarif
          soft_fail: true

      # - name: Upload Security Results to GitHub
      #   uses: github/codeql-action/upload-sarif@v4
      #   if: always()
      #   with:
      #     sarif_file: '.' 
      #     category: 'iac-scanners'

  terraform-validate:
    runs-on: ubuntu-latest
    needs: [terraform-security-scan]
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.6

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

  terraform-tests:
    runs-on: ubuntu-latest
    needs: [terraform-validate]
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        working-directory: ./terraform/test
        run: npm ci

      - name: Run Jest Integration Tests
        working-directory: ./terraform/test
        run: |
          npm run test
        env:
          AWS_REGION: us-east-1

      - name: Run Native Terraform Tests & Coverage Verification
        working-directory: ./terraform
        run: |
          terraform test
          cd test && npm run test:coverage
        env:
          AWS_REGION: us-east-1
